<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>PSA Kiosk - Ticket Selection</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <style>
        :root {
            --primary-blue: #007bff;
            --success-green: #28a745;
            --bg-light: #f8f9fa5e;
            --radius-lg: 40px; /* Main Container Rounding */
            --radius-md: 25px; /* Cards and Buttons Rounding */
        }

        body { 
            min-height: 100vh; 
            font-family: 'Inter', 'Segoe UI', Roboto, sans-serif; 
            display: flex; 
            align-items: center;
            justify-content: center;
            padding: 30px;
            background: linear-gradient(135deg, rgba(0, 110, 255, 0.45), rgba(1, 59, 150, 0.45)), url('./res/PSA-BG.png') center/cover fixed; 
            overflow: hidden;
        }

        .main-container-card {
            border-radius: var(--radius-lg) !important;
            border: none;
            overflow: hidden;
        }

        /* Service Cards */
        .service-card {
            padding: 30px;
            background: white;
            border-radius: var(--radius-md) !important;
            cursor: pointer;
            transition: all 0.3s ease;
            height: 100%;
            border: 2px solid transparent; 
        }

        .service-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.1) !important;
            border-color: var(--primary-blue);
        }

        /* Overlays & Popups */
        .popup-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            padding: 20px;
        }

        .popup-box {
            width: 100%;
            max-width: 500px;
            background: white;
            border-radius: var(--radius-lg) !important;
            overflow: hidden;
            border: none;
            padding: 40px !important;
        }

        /* Large Buttons */
        .btn-xl { 
            padding: 1.2rem; 
            font-size: 1.25rem; 
            font-weight: bold; 
            border-radius: var(--radius-md) !important;
            transition: transform 0.2s;
        }

        .btn-xl:active {
            transform: scale(0.98);
        }

        /* Ticket Stub Visual */
        .ticket-receipt {
            background: #fff;
            border: 2px solid #dee2e6;
            border-radius: var(--radius-md);
            position: relative;
            padding: 25px;
            margin: 20px 0;
        }

        .ticket-receipt::before, .ticket-receipt::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 20px;
            height: 20px;
            background: white;
            border-radius: 50%;
            transform: translateY(-50%);
            border: 2px solid #dee2e6;
        }
        .ticket-receipt::before { left: -12px; }
        .ticket-receipt::after { right: -12px; }

        .ticket-label-large {
            font-size: 3.5rem;
            font-weight: 900;
            color: #1a3d7c;
            letter-spacing: 2px;
        }

        .blue-divider {
            width: 60px; 
            border-top: 5px solid var(--primary-blue); 
            margin: 15px auto;
            border-radius: 10px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="card main-container-card shadow-lg">
            <div class="card-body p-5">
                <div class="text-center mb-5">
                    <img src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEgD1s21ML55b08z-QDtvS8GuQPXWlkU6LxhoVPT0evOLp_8iBY8YFGmnoaiUOjaxrzkx7U30aPMTRt9rcDBFwoOewEnVlFAbvkNY7A1CuaA3-d-FMUNLU-_yB8fMkd_dQjpoixX568092RvvywoUrd9tkN0pVVA8Z9GVUMZKpNY2t2AUoGCQLXZaOD9Ey6F/s800/psa-logo-ph-1.png" alt="PSA Logo" height="100" class="mb-3">
                    <h1 class="font-weight-bold text-primary">Queue Ticketing System</h1>
                    <p class="lead text-muted">Touch your desired service to get a ticket</p>
                    <div class="blue-divider"></div>
                </div>

                <div class="row justify-content-center">
                    <div class="col-md-5 mb-4">
                        <div class="card service-card shadow-sm text-center py-4" onclick="openSelection('national')">
                            <div class="card-body">
                                <i class="fas fa-id-card fa-4x text-primary mb-3"></i>
                                <h4 class="font-weight-bold">National ID</h4>
                                <p class="text-muted small">PhilSys Registration & Updates</p>
                            </div>
                        </div>
                    </div>

                    <div class="col-md-5 mb-4">
                        <div class="card service-card shadow-sm text-center py-4" onclick="openSelection('civil')">
                            <div class="card-body">
                                <i class="fas fa-file-alt fa-4x text-success mb-3"></i>
                                <h4 class="font-weight-bold">Civil Registration</h4>
                                <p class="text-muted small">Birth, Marriage, Death Certs</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="selectionOverlay" class="popup-overlay">
        <div class="popup-box card shadow-lg text-center">
            <h2 class="font-weight-bold mb-4">Select Category</h2>
            <button class="btn btn-primary btn-xl btn-block mb-3" onclick="requestTicket(false)">
                <i class="fas fa-user mr-2"></i> REGULAR 
            </button>
            <button class="btn btn-success btn-xl btn-block mb-3" onclick="requestTicket(true)">
                <i class="fas fa-wheelchair mr-2"></i> PRIORITY
            </button>
            <p class="small text-muted mb-4">Note: Priority's are Pregnant Women, PWD, and Senior Citizen</p>
            <button class="btn btn-link text-muted" onclick="closeAll()">Cancel</button>
        </div>
    </div>

    <div id="resultOverlay" class="popup-overlay">
        <div class="popup-box card shadow-lg text-center">
            <div id="resultContent">
                </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="kiosk.js"></script>
</body>
</html>
